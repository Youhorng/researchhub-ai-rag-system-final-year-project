name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE:      ghcr.io/youhorng/researchhub-ai-rag-system-final-year-project/api
  FRONTEND_IMAGE: ghcr.io/youhorng/researchhub-ai-rag-system-final-year-project/frontend
  AIRFLOW_IMAGE:  ghcr.io/youhorng/researchhub-ai-rag-system-final-year-project/airflow

# ============================================================================
# JOB 1a — Secret scanning (Gitleaks)
# Scans full git history for hardcoded secrets, API keys, passwords
# ============================================================================
jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — Gitleaks scans all commits, not just latest
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # JOB 1b — SAST (Bandit + Semgrep)
  # Static analysis on Python and TypeScript source code
  # ============================================================================
  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Bandit (Python SAST)
        run: |
          pip install bandit
          bandit -r backend/src/ -ll -x backend/src/tests/ --exit-zero

      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/typescript
            p/owasp-top-ten

  # ============================================================================
  # JOB 1c — Dependency scanning (pip-audit + npm audit)
  # Checks for known CVEs in Python and JavaScript dependencies
  # ============================================================================
  dep-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: pip-audit (backend Python deps)
        run: |
          pip install pip-audit uv
          cd backend
          uv export --no-dev --no-hashes -o /tmp/requirements.txt
          pip-audit -r /tmp/requirements.txt \
            --ignore-vuln GHSA-w235-7p84-xx57 \
            --ignore-vuln CVE-2026-25645 || true

      - name: pip-audit (airflow Python deps)
        run: |
          pip install pip-audit
          pip-audit -r backend/airflow/requirements.txt \
            --ignore-vuln CVE-2026-25645 || true

      - name: npm audit (frontend deps)
        run: |
          cd frontend
          npm ci --ignore-scripts
          npm audit --audit-level=high

  # ============================================================================
  # JOB 1d — Code quality (SonarCloud)
  # Code smells, duplication, coverage analysis
  # ============================================================================
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for accurate blame and coverage tracking

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}

  # ============================================================================
  # JOB 2a — Build API image
  # ============================================================================
  build-api:
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, dep-scan, sonarcloud]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Save API image as artifact
        run: docker save ${{ env.API_IMAGE }}:latest | gzip > /tmp/api-image.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: api-image
          path: /tmp/api-image.tar.gz
          retention-days: 1

  # ============================================================================
  # JOB 2b — Build Frontend image
  # ============================================================================
  build-frontend:
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, dep-scan, sonarcloud]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_API_URL=/api/v1
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Save Frontend image as artifact
        run: docker save ${{ env.FRONTEND_IMAGE }}:latest | gzip > /tmp/frontend-image.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: /tmp/frontend-image.tar.gz
          retention-days: 1

  # ============================================================================
  # JOB 2c — Build Airflow image
  # ============================================================================
  build-airflow:
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, dep-scan, sonarcloud]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Airflow image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/airflow
          file: ./backend/airflow/Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.AIRFLOW_IMAGE }}:latest
            ${{ env.AIRFLOW_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=airflow
          cache-to: type=gha,scope=airflow,mode=max

      - name: Save Airflow image as artifact
        run: docker save ${{ env.AIRFLOW_IMAGE }}:latest | gzip > /tmp/airflow-image.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: airflow-image
          path: /tmp/airflow-image.tar.gz
          retention-days: 1

  # ============================================================================
  # JOB 3a — Trivy scan: API image
  # ============================================================================
  scan-api:
    runs-on: ubuntu-latest
    needs: [build-api]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: api-image
          path: /tmp/

      - name: Load API image
        run: docker load < /tmp/api-image.tar.gz

      - name: Trivy scan — API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.API_IMAGE }}:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ============================================================================
  # JOB 3b — Trivy scan: Frontend image
  # ============================================================================
  scan-frontend:
    runs-on: ubuntu-latest
    needs: [build-frontend]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp/

      - name: Load Frontend image
        run: docker load < /tmp/frontend-image.tar.gz

      - name: Trivy scan — Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ============================================================================
  # JOB 3c — Trivy scan: Airflow image
  # ============================================================================
  scan-airflow:
    runs-on: ubuntu-latest
    needs: [build-airflow]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: airflow-image
          path: /tmp/

      - name: Load Airflow image
        run: docker load < /tmp/airflow-image.tar.gz

      - name: Trivy scan — Airflow image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.AIRFLOW_IMAGE }}:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ============================================================================
  # JOB 3d — Trivy scan: IaC (compose.prod.yml)
  # ============================================================================
  scan-iac:
    runs-on: ubuntu-latest
    needs: [build-api]
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan — compose.prod.yml IaC
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: compose.prod.yml
          format: table
          exit-code: 0

  # ============================================================================
  # JOB 4 — Push images to GHCR
  # Pushes verified images with both latest and sha tags
  # ============================================================================
  push-to-ghcr:
    runs-on: ubuntu-latest
    needs: [scan-api, scan-frontend, scan-airflow, scan-iac]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: api-image
          path: /tmp/

      - uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp/

      - uses: actions/download-artifact@v4
        with:
          name: airflow-image
          path: /tmp/

      - name: Load images
        run: |
          docker load < /tmp/api-image.tar.gz
          docker load < /tmp/frontend-image.tar.gz
          docker load < /tmp/airflow-image.tar.gz

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push API image
        run: |
          docker push ${{ env.API_IMAGE }}:latest
          docker tag  ${{ env.API_IMAGE }}:latest ${{ env.API_IMAGE }}:sha-${{ github.sha }}
          docker push ${{ env.API_IMAGE }}:sha-${{ github.sha }}

      - name: Push Frontend image
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:latest
          docker tag  ${{ env.FRONTEND_IMAGE }}:latest ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}

      - name: Push Airflow image
        run: |
          docker push ${{ env.AIRFLOW_IMAGE }}:latest
          docker tag  ${{ env.AIRFLOW_IMAGE }}:latest ${{ env.AIRFLOW_IMAGE }}:sha-${{ github.sha }}
          docker push ${{ env.AIRFLOW_IMAGE }}:sha-${{ github.sha }}

  # ============================================================================
  # JOB 5 — Deploy to DigitalOcean droplet
  # SSHes into the droplet and runs scripts/deploy.sh
  # deploy.sh handles rollback automatically if anything fails
  # ============================================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [push-to-ghcr]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DROPLET_SSH_KEY }}

      - name: Add droplet to known hosts
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -T 60 -H "$DROPLET_HOST" >> ~/.ssh/known_hosts 2>/dev/null || \
          ssh-keyscan -T 60 -H "$DROPLET_HOST" >> ~/.ssh/known_hosts

      - name: Sync deploy script before running it
        # Always push the latest deploy.sh from this commit to the droplet BEFORE
        # executing it. Without this, the droplet runs whatever version was left
        # from the previous (possibly failed) deploy, so script fixes never take effect.
        env:
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          scp scripts/deploy.sh \
            "$DROPLET_USER@$DROPLET_HOST:~/researchhub/scripts/deploy.sh"

      - name: Deploy to droplet
        env:
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          SHA_TAG: sha-${{ github.sha }}
        run: |
          ssh "$DROPLET_USER@$DROPLET_HOST" \
            "IMAGE_TAG=$SHA_TAG bash ~/researchhub/scripts/deploy.sh"
