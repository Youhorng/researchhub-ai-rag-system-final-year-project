server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # index.html — never cache so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Vite-hashed JS/CSS assets — safe to cache for 1 year (filename changes on rebuild)
    location ~* /assets/.*\.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }

    # Static assets (images, fonts, icons) — cache for 1 day
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
    }

    # robots.txt — no cache so changes propagate immediately
    location = /robots.txt {
        add_header Cache-Control "no-cache";
    }

    # All other routes fall back to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
