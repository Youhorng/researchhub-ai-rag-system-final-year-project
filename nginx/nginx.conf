worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 55m;

    # ---------------------------------------------------------------------------
    # Gzip compression
    # Reduces response size for text-based assets before sending to Cloudflare
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml;

    # ---------------------------------------------------------------------------
    # Docker internal DNS — re-resolves container hostnames every 10s so Nginx
    # picks up new container IPs after a redeploy without needing a restart
    # ---------------------------------------------------------------------------
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ---------------------------------------------------------------------------
    # Port 80 — redirect all HTTP to HTTPS
    # Catches anyone who hits http:// and bounces them to https://
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;
        return 301 https://researchhubai.studio$request_uri;
    }

    # ---------------------------------------------------------------------------
    # Port 443 — main server block (Full Strict mode)
    # Cloudflare connects here with the Origin Certificate
    # ---------------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name _;

        # Cloudflare Origin Certificate
        ssl_certificate     /etc/nginx/certs/origin.crt;
        ssl_certificate_key /etc/nginx/certs/origin.key;

        # TLS settings — only modern secure protocols
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       10m;

        # -----------------------------------------------------------------------
        # Cloudflare real IP passthrough
        # Without this, FastAPI sees Cloudflare's IP instead of the user's real IP
        # -----------------------------------------------------------------------
        set_real_ip_from 103.21.244.0/22;
        set_real_ip_from 103.22.200.0/22;
        set_real_ip_from 103.31.4.0/22;
        set_real_ip_from 104.16.0.0/13;
        set_real_ip_from 104.24.0.0/14;
        set_real_ip_from 108.162.192.0/18;
        set_real_ip_from 131.0.72.0/22;
        set_real_ip_from 141.101.64.0/18;
        set_real_ip_from 162.158.0.0/15;
        set_real_ip_from 172.64.0.0/13;
        set_real_ip_from 173.245.48.0/20;
        set_real_ip_from 188.114.96.0/20;
        set_real_ip_from 190.93.240.0/20;
        set_real_ip_from 197.234.240.0/22;
        set_real_ip_from 198.41.128.0/17;
        real_ip_header CF-Connecting-IP;

        # -----------------------------------------------------------------------
        # Security headers
        # -----------------------------------------------------------------------
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # -----------------------------------------------------------------------
        # robots.txt — served inline, bypasses frontend container entirely
        # -----------------------------------------------------------------------
        location = /robots.txt {
            add_header Content-Type "text/plain; charset=utf-8" always;
            add_header Cache-Control "no-cache" always;
            return 200 "User-agent: *\nAllow: /\n";
        }

        # -----------------------------------------------------------------------
        # /api/ → FastAPI backend
        # SSE streaming support is critical for chat (proxy_buffering off)
        # -----------------------------------------------------------------------
        location /api/ {
            set $api_upstream http://api:8000;
            proxy_pass         $api_upstream/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host; # nosemgrep: generic.nginx.security.request-host-used.request-host-used
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE streaming — must disable buffering or chunks are held until buffer fills
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 60s;

            # Required for SSE — prevents nginx from upgrading to chunked transfer
            proxy_set_header   Connection        "";
        }

        # -----------------------------------------------------------------------
        # / → React SPA (frontend nginx)
        # All unmatched routes go to the frontend — React Router handles them
        # -----------------------------------------------------------------------
        location / {
            set $frontend_upstream http://frontend:80;
            proxy_pass         $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host; # nosemgrep: generic.nginx.security.request-host-used.request-host-used
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }
}
