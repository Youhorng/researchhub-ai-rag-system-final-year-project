# ResearchHub - Docker Compose Infrastructure
# All secrets come from .env (single source of truth)
# Run: docker compose up --build -d

services:
  # ===========================================================================
  # APPLICATION LAYER
  # ===========================================================================

  # 1. Backend Service (FastAPI)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: researchhub-api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/api/v1/health'')"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    env_file:
      - .env
    environment:
      # Override .env localhost values with Docker service names for container networking
      - OPENSEARCH_HOST=http://opensearch:9200
      - OPENSEARCH__HOST=http://opensearch:9200
      - POSTGRES_DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS__HOST=redis
      - MINIO_ENDPOINT=minio:9000
    networks:
      - rag-network

  # 2. Frontend Service (React/Vite → Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: researchhub-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - rag-network

  # ===========================================================================
  # CORE INFRASTRUCTURE (Databases, Cache, Search)
  # ===========================================================================

  # 3. PostgreSQL (Main application database)
  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST_AUTH_METHOD=password
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init script: runs on first startup to create airflow_db alongside rag_db.
      # Only runs when the postgres_data volume is empty (fresh install).
      - ./scripts/01_create_databases.sh:/docker-entrypoint-initdb.d/01_create_databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - rag-network

  # 4. Redis (Application cache)
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - rag-network

  # 5. OpenSearch (Vector database for RAG)
  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: rag-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
    ports:
      - "9200:9200"
      - "9600:9600"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - rag-network

  # 6. OpenSearch Dashboards (Web UI to inspect vector indices)
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.0
    container_name: rag-dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      - opensearch
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - rag-network

  # 7. MinIO (S3-compatible object storage for user-uploaded PDFs)
  minio:
    image: docker.io/minio/minio
    container_name: researchhub-minio
    command: server --address ":9000" --console-address ":9001" /data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - rag-network

  # ===========================================================================
  # PIPELINE
  # ===========================================================================

  # 8. Airflow (Scheduled pipelines: weekly ArXiv fetch, re-indexing)
  # Note: Lives inside backend/airflow/ — shares Python deps with backend
  airflow:
    build:
      context: ./backend/airflow
      dockerfile: Dockerfile
    container_name: rag-airflow
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Airflow reads AIRFLOW__* vars natively from .env via env_file above
      # Override service hostnames for Docker networking
      # Airflow uses its own dedicated database — keeps Airflow internal tables
      # completely separate from our 10 app tables in rag_db.
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow_db
      - OPENSEARCH_HOST=http://opensearch:9200
      - OPENSEARCH__HOST=http://opensearch:9200
      - REDIS__HOST=redis
      - PYTHONPATH=/opt/airflow
    volumes:
      - ./backend/airflow/dags:/opt/airflow/dags # Live-edit DAGs without rebuilding
      - ./backend/airflow/data:/opt/airflow/data # Share datasets with DAGs
      - airflow_logs:/opt/airflow/logs
      - ./backend/airflow/plugins:/opt/airflow/plugins
      - ./backend/src:/opt/airflow/src # Share backend service code with DAGs
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - rag-network

# =============================================================================
# VOLUMES (persistent data — survives container restarts)
# WARNING: `docker compose down -v` deletes ALL data
# =============================================================================
volumes:
  postgres_data:
  opensearch_data:
  ollama_data:
  airflow_logs:
  redis_data:
  minio_data:

networks:
  rag-network:
    driver: bridge
