# ResearchHub — EC2 Deployment Compose
# Stripped-down stack for CI/CD midterm demo (Phase 1 + 2 only).
#
# Excluded from full compose.yml:
#   ✗ opensearch      — too heavy for EC2 t2/t3 (needs 1GB+ RAM), needed only in Phase 3+
#   ✗ ollama          — requires GPU or large CPU instance, needed only in Phase 4+
#   ✗ minio           — PDF storage, needed only in Phase 4+
#   ✗ airflow         — pipeline orchestration, needed only in Phase 3+
#   ✗ langfuse-*      — LLM observability, needed only in Phase 5+
#   ✗ clickhouse      — Langfuse analytics backend
#   ✗ opensearch-dashboards — UI for opensearch
#
# Included:
#   ✓ postgres        — main app DB (users, projects, topics)
#   ✓ redis           — cache (app ready even if unused in Phase 2)
#   ✓ api             — FastAPI backend (all Phase 1 + 2 endpoints)
#   ✓ frontend        — React/Nginx (sign-in UI)
#
# Jenkins deploy step (no ECR needed — builds directly on EC2):
#   ssh ec2-user@<EC2_IP> "
#     cd /app/researchhub &&
#     git pull origin main &&
#     docker compose -f compose.ec2.yml up -d --build &&
#     docker compose -f compose.ec2.yml exec -T api uv run alembic upgrade head
#   "

services:
  # ── PostgreSQL (main application database) ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: researchhub-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - researchhub-network

  # ── Redis (application cache) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: researchhub-redis
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      ${REDIS__PASSWORD:+--requirepass ${REDIS__PASSWORD}}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - researchhub-network

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.ec2
    container_name: researchhub-api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override .env localhost values with Docker service names
      - POSTGRES_DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS__HOST=redis
      # Disable services not running in this stack
      - LANGFUSE__ENABLED=false
      - OPENSEARCH_HOST=http://localhost:9200 # not running — will log warnings only
      - OLLAMA_HOST=http://localhost:11434 # not running — will log warnings only
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/api/v1/health'')"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - researchhub-network

  # ── React Frontend (Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass Vite env vars at BUILD TIME — Vite bakes them into the JS bundle
        # These must come from .env on EC2
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
        - VITE_API_URL=http://${EC2_PUBLIC_IP}:8000
    container_name: researchhub-frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - researchhub-network

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  researchhub-network:
    driver: bridge
