# compose.prod.yml — standalone production compose file (DigitalOcean droplet)
# Usage: docker compose -f compose.prod.yml up -d
#
# Differences from local compose.yml:
#   - Redis removed (zero usage in backend/src/)
#   - OpenSearch heap reduced to 512m (fits 2GB droplet RAM budget)
#   - api + frontend + airflow use pre-built images pulled from GHCR
#   - No host port bindings except nginx:80 and ports for SSH tunnel access
#   - nginx reverse proxy added as sole external entry point
#   - Uptime Kuma added for monitoring (SSH tunnel access only)
#   - OpenSearch Dashboards included but start manually only when needed:
#       docker compose -f compose.prod.yml up -d opensearch-dashboards
#       docker compose -f compose.prod.yml stop opensearch-dashboards

services:

  # ---------------------------------------------------------------------------
  # 1. FastAPI Backend
  # ---------------------------------------------------------------------------
  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:${IMAGE_TAG:-latest}
    container_name: researchhub-api
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    env_file:
      - .env
    environment:
      - OPENSEARCH_HOST=http://opensearch:9200
      - OPENSEARCH__HOST=http://opensearch:9200
      - POSTGRES_DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - MINIO_ENDPOINT=minio:9000
    restart: unless-stopped
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # 2. Frontend (React SPA served by nginx)
  # ---------------------------------------------------------------------------
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:${IMAGE_TAG:-latest}
    container_name: researchhub-frontend
    restart: unless-stopped
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # 3. PostgreSQL
  # DB tool access (e.g. TablePlus) via SSH tunnel: ssh -L 5432:localhost:5432 user@droplet
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST_AUTH_METHOD=password
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/01_create_databases.sh:/docker-entrypoint-initdb.d/01_create_databases.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # 4. OpenSearch (512m heap — reduced from 1g for 2GB droplet)
  # ---------------------------------------------------------------------------
  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: rag-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # 5. MinIO (S3-compatible object storage for PDFs)
  # Console access via SSH tunnel: ssh -L 9001:localhost:9001 user@droplet
  # ---------------------------------------------------------------------------
  minio:
    image: docker.io/minio/minio
    container_name: researchhub-minio
    command: server --address ":9000" --console-address ":9001" /data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # 6. Airflow (scheduled paper ingestion DAGs)
  # UI access via SSH tunnel: ssh -L 8080:localhost:8080 user@droplet
  # ---------------------------------------------------------------------------
  airflow:
    image: ghcr.io/${GITHUB_REPOSITORY}/airflow:${IMAGE_TAG:-latest}
    container_name: rag-airflow
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow_db
      - OPENSEARCH_HOST=http://opensearch:9200
      - OPENSEARCH__HOST=http://opensearch:9200
      - PYTHONPATH=/opt/airflow
    volumes:
      - ./backend/airflow/dags:/opt/airflow/dags
      - ./backend/airflow/data:/opt/airflow/data
      - ./backend/airflow/plugins:/opt/airflow/plugins
      - ./backend/src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # 7. nginx reverse proxy — sole external entry point
  # Routes: /api/* → api:8000, /* → frontend:80
  # Cloudflare sits in front and handles HTTPS termination
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: researchhub-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # 8. OpenSearch Dashboards — on-demand only (uses ~400MB RAM)
  # Do NOT include in normal `up -d` — start manually when needed:
  #   docker compose -f compose.prod.yml up -d opensearch-dashboards
  #   docker compose -f compose.prod.yml stop opensearch-dashboards
  # Access via SSH tunnel: ssh -L 5601:localhost:5601 user@droplet
  # ---------------------------------------------------------------------------
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.0
    container_name: rag-dashboards
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      - opensearch
    ports:
      - "5601:5601"
    restart: "no"
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # 9. Uptime Kuma — monitoring dashboard
  # Port 3001 is NOT open in the firewall
  # Access via SSH tunnel: ssh -L 3001:localhost:3001 user@droplet
  # ---------------------------------------------------------------------------
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: researchhub-uptime
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - rag-network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
  opensearch_data:
  minio_data:
  airflow_logs:
  uptime_kuma_data:

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  rag-network:
    driver: bridge
